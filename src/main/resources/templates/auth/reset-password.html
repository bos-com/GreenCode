<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Set New Password</title>
  <style>
    body{font-family:system-ui;margin:40px;max-width:520px}
    input,button{width:100%;padding:12px;margin:10px 0}
    .ok{background:#e8fff0;padding:10px;border:1px solid #7ad39a}
    .err{background:#ffecec;padding:10px;border:1px solid #e08a8a}
  </style>
</head>
<body>
  <h2>Set New Password</h2>

  <div id="msg"></div>

  <form id="newPassForm">
    <input id="token" type="text" placeholder="Reset token" required />
    <input id="password" type="password" placeholder="New password" required minlength="8" />
    <input id="confirm" type="password" placeholder="Confirm new password" required minlength="8" />
    <button type="submit">Update password</button>
  </form>

  <p><a href="/api/auth/reset-request">Start over</a></p>

  <script>
    const API_BASE = "/api";
    const msgEl = document.getElementById("msg");

    // auto-fill token from URL if present
    const params = new URLSearchParams(window.location.search);
    const tokenFromUrl = params.get("token");
    if (tokenFromUrl) document.getElementById("token").value = tokenFromUrl;

    function showMsg(type, text) {
      msgEl.innerHTML = `<div class="${type}">${text}</div>`;
    }

    document.getElementById("newPassForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      msgEl.innerHTML = "";

      const token = document.getElementById("token").value.trim();
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;

      if (password !== confirm) {
        showMsg("err", "Passwords do not match.");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/auth/password-reset/confirm`, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ token, newPassword: password })
        });

        if (res.ok) {
          showMsg("ok", "Password updated successfully. You can now log in.");
          e.target.reset();
        } else {
          const t = await res.text();
          showMsg("err", `Failed: ${t || res.status}`);
        }
      } catch (err) {
        showMsg("err", "Network error. Please try again.");
      }
    });
  </script>
</body>
</html>

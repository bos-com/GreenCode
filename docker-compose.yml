version: '3.8'

services:
  greencode-backend:
    build: .
    container_name: greencode-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/greencode
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=your-secret-key-here-make-it-long-and-secure-in-production
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
    networks:
      - greencode-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: greencode-postgres
    environment:
      - POSTGRES_DB=greencode
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - greencode-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: greencode-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - greencode-network
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: greencode-adminer
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    networks:
      - greencode-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  greencode-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
